<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Remote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">H</div>
        <div>
          <h1>Hermes Remote</h1>
          <p>Render control plane to your PC listener</p>
        </div>
      </div>

      <button id="newConversationBtn" class="ghost-button">New conversation</button>

      <div class="settings-card">
        <label>API Base</label>
        <input id="apiBaseInput" type="text" placeholder="https://your-render-app.onrender.com">
        <label>User Token</label>
        <input id="userTokenInput" type="password" placeholder="Optional">
        <label>Target Device</label>
        <input id="deviceIdInput" type="text" placeholder="home-pc">
        <button id="saveSettingsBtn" class="primary-button">Save settings</button>
      </div>

      <div class="conversation-head">Recent Conversations</div>
      <div id="conversationList" class="conversation-list"></div>
    </aside>

    <main class="chat-panel">
      <div class="chat-topbar">
        <div>
          <div id="conversationTitle" class="conversation-title">No conversation selected</div>
          <div id="statusText" class="status-text">Idle</div>
        </div>
        <button id="refreshBtn" class="ghost-button compact">Refresh</button>
      </div>

      <div id="messages" class="messages"></div>

      <form id="composerForm" class="composer">
        <textarea id="messageInput" rows="3" placeholder="Send a task to your PC..."></textarea>
        <button id="sendBtn" type="submit" class="primary-button">Send</button>
      </form>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
